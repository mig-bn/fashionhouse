spring:
  application:
    name: fashionhouse-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fashionhouse}
    username: ${SPRING_DATASOURCE_USERNAME:fashionhouse}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:changeme_dev_secret_at_least_32_characters_long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-products: ${MINIO_BUCKET_PRODUCTS:product-images}
  bucket-quotations: ${MINIO_BUCKET_QUOTATIONS:quotation-images}

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:TEST-placeholder-token}
  sandbox: ${MERCADOPAGO_SANDBOX:true}
  notification-url: ${MERCADOPAGO_NOTIFICATION_URL:http://localhost:8080/api/payments/webhook/mercadopago}
  success-url: ${MP_SUCCESS_URL:http://localhost:3000/orden}
  failure-url: ${MP_FAILURE_URL:http://localhost:3000/pago-fallido}
  pending-url: ${MP_PENDING_URL:http://localhost:3000/pago-pendiente}

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 30MB

bot:
  whatsapp:
    token: ${WHATSAPP_TOKEN:}
    phone-id: ${WHATSAPP_PHONE_ID:}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:fashionhouse-verify}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    staff-chat-id: ${TELEGRAM_STAFF_CHAT_ID:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
