services:

  postgres:
    image: postgres:16-alpine
    container_name: fashionhouse-postgres
    environment:
      POSTGRES_DB: fashionhouse
      POSTGRES_USER: fashionhouse
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashionhouse -d fashionhouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fashionhouse-net

  minio:
    image: minio/minio:latest
    container_name: fashionhouse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fashionhouse-net

  minio-init:
    image: minio/mc:latest
    container_name: fashionhouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    networks:
      - fashionhouse-net

volumes:
  postgres_data:
  minio_data:

networks:
  fashionhouse-net:
    driver: bridge
